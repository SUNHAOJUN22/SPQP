version: '3.8'

services:
  studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sio-catalyst-studio
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: always

  nginx:
    image: nginx:alpine
    container_name: sio-nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - studio
