services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./storage/sio_studio.sqlite3
      - ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - ./backend/storage:/app/storage
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

