name: sio-sic-ultra-ci

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install root Playwright dependency
        run: npm ci

      - name: Install backend dependencies
        shell: powershell
        run: |
          python -m venv backend\.venv
          backend\.venv\Scripts\python.exe -m pip install --upgrade pip
          backend\.venv\Scripts\python.exe -m pip install -r backend\requirements.txt

      - name: Backend tests with coverage
        run: npm run test:coverage

      - name: Frontend unit tests
        run: npm --prefix frontend run test

      - name: TypeScript strict
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Scientific rigor audit
        run: backend\.venv\Scripts\python.exe scripts\scientific_rigor_audit.py

      - name: Full function smoke
        run: backend\.venv\Scripts\python.exe scripts\full_function_smoke.py

      - name: Ultra quality audit
        run: npm run test:ultra

      - name: Production build
        run: npm run build
